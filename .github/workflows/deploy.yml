name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build VOL3 (dahlia-v3)
        working-directory: vol3
        run: |
          npm install
          npx next build

      - name: Build VOL4 (dahlia)
        working-directory: vol4
        run: |
          npm install
          npx next build

      - name: Build VOL5 (tulip)
        working-directory: vol5
        run: |
          npm install --legacy-peer-deps
          npx next build

      - name: Build VOL6 (tulip-v2)
        working-directory: vol6
        run: |
          npm install --legacy-peer-deps
          npx next build

      - name: Assemble deploy folder
        run: |
          mkdir -p deploy/dahlia
          mkdir -p deploy/dahlia-v3
          mkdir -p deploy/tulip
          mkdir -p deploy/tulip-v2
          mkdir -p deploy/generative
          # VOL4 大丽花 → /dahlia
          cp -r vol4/out/* deploy/dahlia/
          # VOL3 大丽花 → /dahlia-v3
          cp -r vol3/out/* deploy/dahlia-v3/
          # VOL5 郁金香 → /tulip
          cp -r vol5/out/* deploy/tulip/
          # VOL6 郁金香代码版 → /tulip-v2
          cp -r vol6/out/* deploy/tulip-v2/
          # VOL7 生成艺术引擎 → /generative (纯静态HTML+JS)
          cp vol7-generative-engine/index.html deploy/generative/
          cp vol7-generative-engine/engine.js deploy/generative/
          cp vol7-generative-engine/fields.js deploy/generative/
          cp vol7-generative-engine/camera.js deploy/generative/
          cp vol7-generative-engine/io.js deploy/generative/
          cp -r vol7-generative-engine/assets deploy/generative/assets
          # 根目录静态页面
          cp vol4/public/crystal-synthesis.html deploy/
          cp vol4/public/guofeng-synthesis.html deploy/
          cp vol4/public/paper-synthesis.html deploy/
          # 易集卡相关页面和资源
          cp card-grades.html deploy/
          cp canvas-holo.html deploy/
          cp fragment-animation.html deploy/
          cp 492x656.jpg deploy/
          cp 492x656APNG.png deploy/
          cp BG_198-720.png deploy/
          cp card-cloth.html deploy/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4