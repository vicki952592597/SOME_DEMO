name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build VOL4 (dahlia)
        working-directory: vol4
        run: |
          npm install
          npx next build

      - name: Assemble deploy folder
        run: |
          mkdir -p deploy/dahlia
          # 复制大丽花到 /dahlia 子路径
          cp -r vol4/out/* deploy/dahlia/
          # 复制根目录静态页面（synthesis 等）
          cp vol4/public/crystal-synthesis.html deploy/
          cp vol4/public/guofeng-synthesis.html deploy/
          cp vol4/public/paper-synthesis.html deploy/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4