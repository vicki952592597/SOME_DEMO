<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>全息卡牌 Canvas DEMO · 小程序可落地</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    min-height: 100vh;
    background: #060609;
    font-family: -apple-system, 'PingFang SC', sans-serif;
    color: #fff;
    overflow-x: hidden;
    padding: 0 0 40px;
}
.page-header {
    text-align: center;
    padding: 30px 16px 20px;
}
.page-header h1 {
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.8);
}
.page-header p {
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    margin-top: 8px;
    letter-spacing: 2px;
}
.cards-wrap {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 24px;
    padding: 0 12px;
    max-width: 900px;
    margin: 0 auto;
}
.card-box {
    text-align: center;
}
.card-box canvas {
    display: block;
    border-radius: 12px;
    touch-action: none;
}
.card-label {
    margin-top: 10px;
    font-size: 11px;
    letter-spacing: 3px;
    font-weight: 600;
}
.card-desc {
    font-size: 9px;
    color: rgba(255,255,255,0.25);
    margin-top: 4px;
    letter-spacing: 1px;
}
.label-ssr { color: #ffd780; }
.label-sr { color: #c9a0ff; }
.label-r { color: #7ab8ff; }
.label-n { color: rgba(255,255,255,0.4); }
.note {
    text-align: center;
    padding: 30px 20px 10px;
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 1px;
    line-height: 1.8;
}
</style>
</head>
<body>

<div class="page-header">
    <h1>Canvas 全息卡牌</h1>
    <p>纯 Canvas 2D · 零 CSS 混合模式 · 可直接移植小程序</p>
</div>

<div class="cards-wrap" id="cardsWrap"></div>

<div class="note">
    所有全息效果均由 Canvas 2D globalCompositeOperation 实现<br>
    不依赖 mix-blend-mode / mask-image / backdrop-filter<br>
    可直接移植至微信小程序 Canvas 2D 或 Taro
</div>

<script>
// ============================================================
//  配置
// ============================================================
var CARD_W = 246;   // canvas 显示宽（CSS px）
var CARD_H = 328;   // canvas 显示高
var DPR = Math.min(window.devicePixelRatio || 1, 2);
var IMG_SRC = './492x656APNG.png';
var IMG_FALLBACK = './492x656.jpg';

// 四个等级配置
var GRADES = [
    {
        id: 'ssr',
        label: 'SSR',
        labelClass: 'label-ssr',
        desc: '宇宙星辰 · 多层幻彩 · 极致闪光',
        // 全息参数
        rainbow: true,          // 彩虹色谱
        rainbowIntensity: 1.0,  // 色谱强度
        glitter: true,          // 闪光粒子
        glitterDensity: 120,    // 粒子数量
        glitterBright: 1.0,     // 粒子亮度
        scanlines: true,        // 扫描线
        scanlineAlpha: 0.12,    // 扫描线透明度
        spotlight: true,        // 聚光灯
        spotlightRadius: 0.7,   // 聚光半径
        spotlightAlpha: 0.55,   // 聚光强度
        tiltAngle: 18,          // 3D倾斜角度
        glowColor: [255, 200, 80],   // 外发光颜色
        glowAlpha: 0.5,
        // SSR独有：二次彩虹 + 星尘
        dualRainbow: true,
        stardust: true,
        stardustCount: 60,
    },
    {
        id: 'sr',
        label: 'SR',
        labelClass: 'label-sr',
        desc: '经典扫描线 · 彩虹光谱 · 闪光',
        rainbow: true,
        rainbowIntensity: 0.75,
        glitter: true,
        glitterDensity: 60,
        glitterBright: 0.7,
        scanlines: true,
        scanlineAlpha: 0.1,
        spotlight: true,
        spotlightRadius: 0.55,
        spotlightAlpha: 0.4,
        tiltAngle: 15,
        glowColor: [180, 130, 255],
        glowAlpha: 0.35,
        dualRainbow: false,
        stardust: false,
        stardustCount: 0,
    },
    {
        id: 'r',
        label: 'R',
        labelClass: 'label-r',
        desc: '单色光泽 · 柔和扫描线',
        rainbow: false,
        rainbowIntensity: 0,
        glitter: false,
        glitterDensity: 0,
        glitterBright: 0,
        scanlines: true,
        scanlineAlpha: 0.06,
        spotlight: true,
        spotlightRadius: 0.45,
        spotlightAlpha: 0.25,
        tiltAngle: 12,
        glowColor: [100, 170, 255],
        glowAlpha: 0.2,
        monoHue: 210,  // R级用单色
        dualRainbow: false,
        stardust: false,
        stardustCount: 0,
    },
    {
        id: 'n',
        label: 'N',
        labelClass: 'label-n',
        desc: '极淡银色光泽',
        rainbow: false,
        rainbowIntensity: 0,
        glitter: false,
        glitterDensity: 0,
        glitterBright: 0,
        scanlines: false,
        scanlineAlpha: 0,
        spotlight: true,
        spotlightRadius: 0.35,
        spotlightAlpha: 0.12,
        tiltAngle: 8,
        glowColor: [180, 180, 180],
        glowAlpha: 0.08,
        dualRainbow: false,
        stardust: false,
        stardustCount: 0,
    }
];

// ============================================================
//  彩虹色表
// ============================================================
var RAINBOW_COLORS = [
    [255, 80, 80],    // red
    [255, 200, 60],   // yellow
    [80, 255, 80],    // green
    [80, 240, 255],   // cyan
    [100, 120, 255],  // blue
    [200, 80, 255],   // violet
];

// ============================================================
//  工具函数
// ============================================================
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function hsl2rgb(h, s, l) {
    h = ((h % 360) + 360) % 360;
    s = clamp(s, 0, 1); l = clamp(l, 0, 1);
    var c = (1 - Math.abs(2 * l - 1)) * s;
    var x = c * (1 - Math.abs((h / 60) % 2 - 1));
    var m = l - c / 2;
    var r, g, b;
    if (h < 60)       { r = c; g = x; b = 0; }
    else if (h < 120) { r = x; g = c; b = 0; }
    else if (h < 180) { r = 0; g = c; b = x; }
    else if (h < 240) { r = 0; g = x; b = c; }
    else if (h < 300) { r = x; g = 0; b = c; }
    else              { r = c; g = 0; b = x; }
    return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
}

// ============================================================
//  闪光粒子预生成
// ============================================================
function createGlitterParticles(count) {
    var particles = [];
    for (var i = 0; i < count; i++) {
        particles.push({
            x: Math.random(),   // 归一化坐标 0~1
            y: Math.random(),
            size: 0.5 + Math.random() * 2,
            phase: Math.random() * Math.PI * 2,
            speed: 0.5 + Math.random() * 2,
            bright: 0.3 + Math.random() * 0.7,
        });
    }
    return particles;
}

// 星尘粒子
function createStardustParticles(count) {
    var particles = [];
    for (var i = 0; i < count; i++) {
        particles.push({
            x: Math.random(),
            y: Math.random(),
            size: 1 + Math.random() * 3,
            phase: Math.random() * Math.PI * 2,
            speed: 0.2 + Math.random() * 0.8,
            hue: Math.random() * 360,
        });
    }
    return particles;
}

// ============================================================
//  单张卡牌控制器
// ============================================================
function HoloCard(canvas, config, cardImg) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.config = config;
    this.cardImg = cardImg;
    this.w = CARD_W * DPR;
    this.h = CARD_H * DPR;
    canvas.width = this.w;
    canvas.height = this.h;
    canvas.style.width = CARD_W + 'px';
    canvas.style.height = CARD_H + 'px';

    // 指针位置（归一化 0~1）
    this.px = 0.5;
    this.py = 0.5;
    this.active = false;  // 是否正在交互
    this.targetPx = 0.5;
    this.targetPy = 0.5;

    // 闪光粒子
    this.glitterParticles = config.glitter ? createGlitterParticles(config.glitterDensity) : [];
    this.stardustParticles = config.stardust ? createStardustParticles(config.stardustCount) : [];

    // 离屏Canvas用于特效合成（避免 destination-in 影响主Canvas）
    this.offCanvas = document.createElement('canvas');
    this.offCanvas.width = this.w;
    this.offCanvas.height = this.h;
    this.offCtx = this.offCanvas.getContext('2d');

    // 离屏彩虹纹理（预渲染）
    this.rainbowCache = null;
    if (config.rainbow) {
        this.rainbowCache = document.createElement('canvas');
        this.rainbowCache.width = this.w;
        this.rainbowCache.height = this.h;
    }

    this.time = 0;
    this.bindEvents();
}

HoloCard.prototype.bindEvents = function() {
    var self = this;
    var canvas = this.canvas;

    // 触摸
    canvas.addEventListener('touchstart', function(e) {
        e.preventDefault();
        self.active = true;
        self.updatePointer(e.touches[0]);
    }, { passive: false });
    canvas.addEventListener('touchmove', function(e) {
        e.preventDefault();
        self.updatePointer(e.touches[0]);
    }, { passive: false });
    canvas.addEventListener('touchend', function() {
        self.active = false;
        self.targetPx = 0.5;
        self.targetPy = 0.5;
    });

    // 鼠标
    canvas.addEventListener('mouseenter', function() { self.active = true; });
    canvas.addEventListener('mousemove', function(e) {
        self.active = true;
        self.updatePointerMouse(e);
    });
    canvas.addEventListener('mouseleave', function() {
        self.active = false;
        self.targetPx = 0.5;
        self.targetPy = 0.5;
    });
};

HoloCard.prototype.updatePointer = function(touch) {
    var rect = this.canvas.getBoundingClientRect();
    this.targetPx = clamp((touch.clientX - rect.left) / rect.width, 0, 1);
    this.targetPy = clamp((touch.clientY - rect.top) / rect.height, 0, 1);
};

HoloCard.prototype.updatePointerMouse = function(e) {
    var rect = this.canvas.getBoundingClientRect();
    this.targetPx = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    this.targetPy = clamp((e.clientY - rect.top) / rect.height, 0, 1);
};

HoloCard.prototype.update = function(dt) {
    this.time += dt;
    // 平滑插值指针位置
    var speed = this.active ? 0.15 : 0.06;
    this.px += (this.targetPx - this.px) * speed;
    this.py += (this.targetPy - this.py) * speed;
};

HoloCard.prototype.draw = function() {
    var ctx = this.ctx;
    var w = this.w, h = this.h;
    var cfg = this.config;
    var px = this.px, py = this.py;
    var intensity = this.active ? 1 : 0.15;

    ctx.clearRect(0, 0, w, h);

    // 获取当前帧图源（APNG 离屏 Canvas 或静态 Image）
    var imgSrc = this.cardImg;
    // Canvas 元素用 .width 判断，Image 元素用 .complete + .naturalWidth 判断
    var imgValid = imgSrc && imgSrc.width > 0 && (imgSrc instanceof HTMLCanvasElement ? apngReady : (imgSrc.complete && imgSrc.naturalWidth > 0));

    // ===== 1. 绘制底图（APNG 动态帧）=====
    if (imgValid) {
        ctx.drawImage(imgSrc, 0, 0, w, h);
    } else {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, w, h);
    }

    // ===== 2. 全息特效层：先画到离屏Canvas，再用 source-atop 合成 =====
    // 在离屏Canvas上绘制所有特效
    var offCtx = this.offCtx;
    offCtx.clearRect(0, 0, w, h);

    // 先在离屏画一个底（用底图的alpha作为基底）
    if (imgValid) {
        offCtx.drawImage(imgSrc, 0, 0, w, h);
    }

    // 2a. 彩虹色谱层 (color-dodge)
    if (cfg.rainbow && cfg.rainbowIntensity > 0) {
        this.drawRainbowLayer(offCtx, w, h, px, py, intensity, cfg.rainbowIntensity);
    }

    // 2b. R级单色光泽
    if (cfg.monoHue !== undefined) {
        this.drawMonoSheen(offCtx, w, h, px, py, intensity, cfg.monoHue);
    }

    // 2c. 二次彩虹（SSR独有）
    if (cfg.dualRainbow) {
        this.drawDualRainbow(offCtx, w, h, px, py, intensity);
    }

    // 2d. 扫描线
    if (cfg.scanlines) {
        this.drawScanlines(offCtx, w, h, px, py, intensity, cfg.scanlineAlpha);
    }

    // 2e. 闪光粒子
    if (cfg.glitter && this.glitterParticles.length > 0) {
        this.drawGlitter(offCtx, w, h, px, py, intensity, cfg.glitterBright);
    }

    // 2f. 星尘（SSR独有）
    if (cfg.stardust && this.stardustParticles.length > 0) {
        this.drawStardust(offCtx, w, h, px, py, intensity);
    }

    // 2g. 聚光灯
    if (cfg.spotlight) {
        this.drawSpotlight(offCtx, w, h, px, py, intensity, cfg.spotlightRadius, cfg.spotlightAlpha);
    }

    // 2h. 高光边缘
    this.drawEdgeHighlight(offCtx, w, h, px, py, intensity);

    // 用原图alpha裁切离屏特效层
    if (imgValid) {
        offCtx.save();
        offCtx.globalCompositeOperation = 'destination-in';
        offCtx.drawImage(imgSrc, 0, 0, w, h);
        offCtx.restore();
    }

    // ===== 3. 把离屏特效层合成到主Canvas =====
    ctx.drawImage(this.offCanvas, 0, 0);

    // ===== 4. 外发光（遮罩之外，不受裁剪）=====
    if (this.active && cfg.glowAlpha > 0) {
        this.drawOuterGlow(ctx, w, h, cfg.glowColor, cfg.glowAlpha * intensity);
    }
};

// ===== 圆角矩形 =====
HoloCard.prototype.roundRect = function(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
};

// ===== 彩虹色谱层 =====
HoloCard.prototype.drawRainbowLayer = function(ctx, w, h, px, py, intensity, rainbowIntensity) {
    ctx.save();
    ctx.globalCompositeOperation = 'color-dodge';

    // 彩虹渐变 - 角度随指针移动
    var angle = (px - 0.5) * Math.PI * 0.6 + Math.PI * 0.4;
    var cos = Math.cos(angle), sin = Math.sin(angle);
    var cx = w * 0.5, cy = h * 0.5;
    var len = Math.max(w, h) * 0.8;

    // 偏移随指针
    var offsetX = (px - 0.5) * w * 0.6;
    var offsetY = (py - 0.5) * h * 0.6;

    var grad = ctx.createLinearGradient(
        cx - cos * len + offsetX, cy - sin * len + offsetY,
        cx + cos * len + offsetX, cy + sin * len + offsetY
    );

    // 重复彩虹
    var steps = 18;
    for (var i = 0; i <= steps; i++) {
        var t = i / steps;
        var ci = Math.floor((t * 3) % RAINBOW_COLORS.length);
        var ni = (ci + 1) % RAINBOW_COLORS.length;
        var lt = (t * 3) % 1;
        var r = lerp(RAINBOW_COLORS[ci][0], RAINBOW_COLORS[ni][0], lt);
        var g = lerp(RAINBOW_COLORS[ci][1], RAINBOW_COLORS[ni][1], lt);
        var b = lerp(RAINBOW_COLORS[ci][2], RAINBOW_COLORS[ni][2], lt);
        var alpha = 0.25 * rainbowIntensity * intensity;
        grad.addColorStop(t, 'rgba(' + Math.round(r) + ',' + Math.round(g) + ',' + Math.round(b) + ',' + alpha + ')');
    }

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
};

// ===== 二次彩虹（SSR）=====
HoloCard.prototype.drawDualRainbow = function(ctx, w, h, px, py, intensity) {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';

    // 第二层彩虹 - 不同角度和偏移
    var angle2 = (py - 0.5) * Math.PI * 0.5 + Math.PI * 0.7;
    var cos2 = Math.cos(angle2), sin2 = Math.sin(angle2);
    var cx = w * 0.5, cy = h * 0.5;
    var len = Math.max(w, h) * 0.7;
    var offsetX = (py - 0.5) * w * 0.4;
    var offsetY = (px - 0.5) * h * 0.4;

    var grad2 = ctx.createLinearGradient(
        cx - cos2 * len + offsetX, cy - sin2 * len + offsetY,
        cx + cos2 * len + offsetX, cy + sin2 * len + offsetY
    );

    var steps = 14;
    for (var i = 0; i <= steps; i++) {
        var t = i / steps;
        var ci = Math.floor((t * 2 + 3) % RAINBOW_COLORS.length);
        var ni = (ci + 1) % RAINBOW_COLORS.length;
        var lt = (t * 2) % 1;
        var r = lerp(RAINBOW_COLORS[ci][0], RAINBOW_COLORS[ni][0], lt);
        var g = lerp(RAINBOW_COLORS[ci][1], RAINBOW_COLORS[ni][1], lt);
        var b = lerp(RAINBOW_COLORS[ci][2], RAINBOW_COLORS[ni][2], lt);
        grad2.addColorStop(t, 'rgba(' + Math.round(r) + ',' + Math.round(g) + ',' + Math.round(b) + ',' + (0.15 * intensity) + ')');
    }

    ctx.fillStyle = grad2;
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
};

// ===== 单色光泽（R级）=====
HoloCard.prototype.drawMonoSheen = function(ctx, w, h, px, py, intensity, hue) {
    ctx.save();
    ctx.globalCompositeOperation = 'color-dodge';

    var cx = px * w, cy = py * h;
    var radius = Math.max(w, h) * 0.6;
    var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    var rgb = hsl2rgb(hue, 0.4, 0.55);
    grad.addColorStop(0, 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',' + (0.2 * intensity) + ')');
    grad.addColorStop(0.5, 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',' + (0.06 * intensity) + ')');
    grad.addColorStop(1, 'rgba(0,0,0,0)');

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
};

// ===== 扫描线 =====
HoloCard.prototype.drawScanlines = function(ctx, w, h, px, py, intensity, alpha) {
    ctx.save();
    ctx.globalCompositeOperation = 'overlay';

    var lineGap = 3 * DPR;
    var offset = ((py - 0.5) * h * 0.3) % lineGap;
    var a = alpha * intensity;

    ctx.strokeStyle = 'rgba(255,255,255,' + a + ')';
    ctx.lineWidth = 0.5 * DPR;
    ctx.beginPath();
    for (var y = offset; y < h; y += lineGap) {
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
    }
    ctx.stroke();
    ctx.restore();
};

// ===== 闪光粒子 =====
HoloCard.prototype.drawGlitter = function(ctx, w, h, px, py, intensity, bright) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';

    var time = this.time;
    for (var i = 0; i < this.glitterParticles.length; i++) {
        var p = this.glitterParticles[i];
        // 粒子闪烁
        var flicker = Math.sin(time * p.speed * 3 + p.phase) * 0.5 + 0.5;
        // 距离指针越近越亮
        var dx = p.x - px, dy = p.y - py;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var proximity = Math.max(0, 1 - dist * 2.5);
        var alpha = flicker * p.bright * bright * intensity * (0.3 + proximity * 0.7);

        if (alpha < 0.02) continue;

        var x = p.x * w;
        var y = p.y * h;
        var size = p.size * DPR * (0.8 + proximity * 0.5);

        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();

        // 十字星芒（较亮粒子）
        if (alpha > 0.3 && size > 1.5) {
            ctx.globalAlpha = alpha * 0.5;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 0.5 * DPR;
            var sLen = size * 2.5;
            ctx.beginPath();
            ctx.moveTo(x - sLen, y); ctx.lineTo(x + sLen, y);
            ctx.moveTo(x, y - sLen); ctx.lineTo(x, y + sLen);
            ctx.stroke();
        }
    }
    ctx.globalAlpha = 1;
    ctx.restore();
};

// ===== 星尘（SSR独有）=====
HoloCard.prototype.drawStardust = function(ctx, w, h, px, py, intensity) {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    var time = this.time;

    for (var i = 0; i < this.stardustParticles.length; i++) {
        var p = this.stardustParticles[i];
        var drift = Math.sin(time * p.speed + p.phase) * 0.02;
        var x = ((p.x + drift + time * 0.005 * p.speed) % 1) * w;
        var y = ((p.y + Math.cos(time * p.speed * 0.7 + p.phase) * 0.01) % 1) * h;
        var flicker = Math.sin(time * p.speed * 2.5 + p.phase * 3) * 0.5 + 0.5;
        var alpha = flicker * 0.4 * intensity;

        if (alpha < 0.02) continue;

        var rgb = hsl2rgb(p.hue + time * 20, 0.8, 0.7);
        var size = p.size * DPR * (0.6 + flicker * 0.4);

        ctx.globalAlpha = alpha;

        // 柔和发光
        var grd = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
        grd.addColorStop(0, 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0.8)');
        grd.addColorStop(0.4, 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0.2)');
        grd.addColorStop(1, 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0)');
        ctx.fillStyle = grd;
        ctx.fillRect(x - size * 3, y - size * 3, size * 6, size * 6);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
};

// ===== 聚光灯 =====
HoloCard.prototype.drawSpotlight = function(ctx, w, h, px, py, intensity, radius, alpha) {
    ctx.save();
    ctx.globalCompositeOperation = 'overlay';

    var cx = px * w, cy = py * h;
    var r = Math.max(w, h) * radius;
    var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    var a = alpha * intensity;
    grad.addColorStop(0, 'rgba(255,255,255,' + (a * 0.9) + ')');
    grad.addColorStop(0.3, 'rgba(255,255,255,' + (a * 0.4) + ')');
    grad.addColorStop(0.7, 'rgba(0,0,0,' + (a * 0.1) + ')');
    grad.addColorStop(1, 'rgba(0,0,0,' + (a * 0.3) + ')');

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
};

// ===== 边缘高光 =====
HoloCard.prototype.drawEdgeHighlight = function(ctx, w, h, px, py, intensity) {
    if (intensity < 0.1) return;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = 0.12 * intensity;

    // 上边缘
    var edgeGrad = ctx.createLinearGradient(0, 0, 0, h * 0.08);
    edgeGrad.addColorStop(0, 'rgba(255,255,255,0.5)');
    edgeGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = edgeGrad;
    ctx.fillRect(0, 0, w, h * 0.08);

    // 指针侧边光
    var sideX = px * w;
    var sideGrad = ctx.createLinearGradient(sideX - w * 0.3, 0, sideX + w * 0.3, 0);
    sideGrad.addColorStop(0, 'rgba(255,255,255,0)');
    sideGrad.addColorStop(0.5, 'rgba(255,255,255,0.15)');
    sideGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = sideGrad;
    ctx.fillRect(0, 0, w, h);

    ctx.restore();
};

// ===== 外发光 =====
HoloCard.prototype.drawOuterGlow = function(ctx, w, h, color, alpha) {
    ctx.save();
    ctx.shadowColor = 'rgba(' + color[0] + ',' + color[1] + ',' + color[2] + ',' + alpha + ')';
    ctx.shadowBlur = 25 * DPR;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 5 * DPR;

    this.roundRect(ctx, 2, 2, w - 4, h - 4, 12 * DPR);
    ctx.strokeStyle = 'rgba(' + color[0] + ',' + color[1] + ',' + color[2] + ',0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();
};

// ============================================================
//  APNG 动态帧管理器（共享）
// ============================================================
var apngFrameCanvas = document.createElement('canvas');
apngFrameCanvas.width = 492;
apngFrameCanvas.height = 656;
var apngFrameCtx = apngFrameCanvas.getContext('2d');
var apngReady = false;

// 静态回退图
var cardImgStatic = new Image();
cardImgStatic.crossOrigin = 'anonymous';
cardImgStatic.src = IMG_FALLBACK;
cardImgStatic.onload = function() {
    apngFrameCtx.drawImage(cardImgStatic, 0, 0, 492, 656);
    apngReady = true;
};

// 加载 apng-js 库并解析 APNG
(function loadApngLib() {
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/apng-js@1.1.2/dist/apng-js.min.js';
    script.onload = function() {
        fetch(IMG_SRC).then(function(r) {
            if (!r.ok) throw new Error('not found');
            return r.arrayBuffer();
        }).then(function(buf) {
            var apng = parseAPNG(buf);
            if (apng instanceof Error) {
                console.log('Not APNG, using static');
                return;
            }
            apng.createImages().then(function() {
                apngReady = true;
                var frameIdx = 0;
                var lastFrameTime = 0;
                // 逐帧播放
                function tickApng(ts) {
                    if (!apng.frames || apng.frames.length === 0) return;
                    var frame = apng.frames[frameIdx];
                    var delay = frame.delay || 100;
                    if (ts - lastFrameTime >= delay) {
                        // 清除旧帧
                        apngFrameCtx.clearRect(0, 0, 492, 656);
                        // 按照 APNG 规范逐帧绘制
                        // 简化处理：每帧全画（适用于大多数 APNG）
                        apngFrameCtx.drawImage(frame.imageElement, frame.left, frame.top);
                        lastFrameTime = ts;
                        frameIdx = (frameIdx + 1) % apng.frames.length;
                    }
                    requestAnimationFrame(tickApng);
                }
                requestAnimationFrame(tickApng);
            });
        }).catch(function() {
            console.log('APNG load failed, using static');
        });
    };
    script.onerror = function() {
        console.log('apng-js load failed, using static image');
    };
    document.head.appendChild(script);
})();

// ============================================================
//  初始化
// ============================================================
var holoCards = [];
var wrap = document.getElementById('cardsWrap');

GRADES.forEach(function(cfg) {
    var box = document.createElement('div');
    box.className = 'card-box';

    var canvas = document.createElement('canvas');
    box.appendChild(canvas);

    var label = document.createElement('div');
    label.className = 'card-label ' + cfg.labelClass;
    label.textContent = cfg.label;
    box.appendChild(label);

    var desc = document.createElement('div');
    desc.className = 'card-desc';
    desc.textContent = cfg.desc;
    box.appendChild(desc);

    wrap.appendChild(box);

    // 传入共享的 apngFrameCanvas 作为动态图源
    var holo = new HoloCard(canvas, cfg, apngFrameCanvas);
    holoCards.push(holo);
});

// ============================================================
//  动画循环
// ============================================================
var lastTime = 0;
function animate(timestamp) {
    var dt = (timestamp - lastTime) / 1000;
    if (dt > 0.1) dt = 0.016;
    lastTime = timestamp;

    holoCards.forEach(function(card) {
        card.update(dt);
        card.draw();
    });

    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ============================================================
//  陀螺仪（移动端）
// ============================================================
if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientation', function(e) {
        var beta = e.beta || 0;
        var gamma = e.gamma || 0;
        var px = clamp((gamma + 45) / 90, 0, 1);
        var py = clamp((beta + 20) / 80, 0, 1);

        holoCards.forEach(function(card) {
            if (!card.active) {
                card.targetPx = px;
                card.targetPy = py;
            }
        });
    });
}
