<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VOL2 · 布料飘动卡牌 · Three.js Cloth Animation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    min-height: 100vh;
    background: #060609;
    background-image:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(88, 40, 120, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(30, 60, 120, 0.08) 0%, transparent 50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 80px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
    overflow-x: hidden;
    color: #fff;
}

/* ===== 页面标题 ===== */
.page-header {
    text-align: center;
    margin-bottom: 40px;
}
.page-header h1 {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 8px;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
}
.page-header h1 span {
    font-weight: 600;
    background: linear-gradient(135deg, #e8d5b7 0%, #f5e6d0 40%, #d4a574 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.page-header .subtitle {
    color: rgba(255,255,255,0.22);
    font-size: 11px;
    margin-top: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
}
.page-header .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    margin: 16px auto 0;
}

/* ===== 卡牌容器 ===== */
.cards-row {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 1400px;
}

.card-wrapper {
    text-align: center;
}

.card-wrapper canvas {
    border-radius: 12px;
    cursor: pointer;
}

.card-label {
    margin-top: 14px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
}
.card-label strong {
    color: rgba(255,255,255,0.6);
    font-weight: 500;
}
.card-label span {
    display: block;
    color: rgba(255,255,255,0.2);
    font-size: 10px;
    margin-top: 4px;
    font-weight: 300;
}

/* ===== 控制面板 ===== */
.controls {
    margin-top: 36px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
}
.controls label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    letter-spacing: 1px;
}
.controls input[type="range"] {
    width: 120px;
    accent-color: #d4a574;
}
.controls .value-display {
    color: rgba(255,255,255,0.6);
    min-width: 30px;
    text-align: right;
    font-variant-numeric: tabular-nums;
}

@media (max-width: 768px) {
    .cards-row { gap: 20px; }
    .page-header h1 { font-size: 16px; letter-spacing: 4px; }
}
</style>
</head>
<body>

<div class="page-header">
    <h1><span>Cloth Card</span> VOL.2</h1>
    <p class="subtitle">Three.js · Plane Geometry Cloth Simulation · Wave Vertex Animation</p>
    <div class="divider"></div>
</div>

<div class="cards-row" id="cardsRow"></div>

<div class="controls">
    <label>
        Wind Speed
        <input type="range" id="windSpeed" min="0" max="3" step="0.1" value="1.2">
        <span class="value-display" id="windSpeedVal">1.2</span>
    </label>
    <label>
        Wave Height
        <input type="range" id="waveHeight" min="0" max="1" step="0.05" value="0.35">
        <span class="value-display" id="waveHeightVal">0.35</span>
    </label>
    <label>
        Wave Freq
        <input type="range" id="waveFreq" min="0.5" max="5" step="0.1" value="2.0">
        <span class="value-display" id="waveFreqVal">2.0</span>
    </label>
</div>

<script>
// ============================================================
//  VOL2: Three.js 布料飘动卡牌
//  PlaneGeometry(4,4,64,64) + sin/cos 顶点波浪动画
// ============================================================

var cards = [
    { label: 'SSR', desc: '宇宙全息 + 布料飘动', holo: true,  holoIntensity: 1.0 },
    { label: 'SR',  desc: '幻彩扫描 + 布料飘动', holo: true,  holoIntensity: 0.6 },
    { label: 'R',   desc: '单色光泽 + 布料飘动', holo: true,  holoIntensity: 0.3 },
    { label: 'N',   desc: '基础布料飘动',         holo: false, holoIntensity: 0.0 }
];

// 参数
var params = {
    windSpeed: 1.2,
    waveHeight: 0.35,
    waveFreq: 2.0
};

// 绑定控件
['windSpeed', 'waveHeight', 'waveFreq'].forEach(function(key) {
    var input = document.getElementById(key);
    var display = document.getElementById(key + 'Val');
    input.addEventListener('input', function() {
        params[key] = parseFloat(this.value);
        display.textContent = this.value;
    });
});

// 创建每张卡
var instances = [];
var canvasW = 280, canvasH = 390;

cards.forEach(function(cfg, idx) {
    var wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';

    var canvas = document.createElement('canvas');
    canvas.width = canvasW * 2;   // 2x for retina
    canvas.height = canvasH * 2;
    canvas.style.width = canvasW + 'px';
    canvas.style.height = canvasH + 'px';
    wrapper.appendChild(canvas);

    var labelEl = document.createElement('div');
    labelEl.className = 'card-label';
    labelEl.innerHTML = '<strong>' + cfg.label + '</strong><span>' + cfg.desc + '</span>';
    wrapper.appendChild(labelEl);

    document.getElementById('cardsRow').appendChild(wrapper);

    // 创建 Three.js 场景
    var instance = createClothCard(canvas, cfg, idx);
    instances.push(instance);
});

function createClothCard(canvas, cfg, idx) {
    // ===== 渲染器 =====
    var renderer = new THREE.WebGLRenderer({
        canvas: canvas,
        antialias: true,
        alpha: true
    });
    renderer.setPixelRatio(2);
    renderer.setSize(canvasW, canvasH);
    renderer.setClearColor(0x000000, 0);

    // ===== 场景 =====
    var scene = new THREE.Scene();

    // ===== 相机 =====
    var camera = new THREE.PerspectiveCamera(45, canvasW / canvasH, 0.1, 100);
    camera.position.set(0, 0, 6);
    camera.lookAt(0, 0, 0);

    // ===== 灯光 =====
    var ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    var directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(2, 3, 5);
    scene.add(directionalLight);

    // 背面补光
    var backLight = new THREE.DirectionalLight(0x8888ff, 0.3);
    backLight.position.set(-2, -1, -3);
    scene.add(backLight);

    // ===== 布料几何体 =====
    var planeW = 3.2, planeH = 3.2 / 0.718;  // 保持卡牌比例
    var segW = 64, segH = 64;
    var geometry = new THREE.PlaneGeometry(planeW, planeH, segW, segH);

    // 保存初始顶点位置
    var positions = geometry.attributes.position;
    var initialPositions = new Float32Array(positions.count * 3);
    for (var i = 0; i < positions.count * 3; i++) {
        initialPositions[i] = positions.array[i];
    }

    // ===== 纹理加载 =====
    var textureLoader = new THREE.TextureLoader();

    // 加载 APNG 的静态帧（Three.js 不支持 APNG 动画，用 jpg 作为纹理）
    var cardTexture = textureLoader.load('./492x656.jpg', function(tex) {
        tex.encoding = THREE.sRGBEncoding;
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
    });

    // ===== 材质 =====
    var material;
    if (cfg.holo) {
        // 全息材质 - 自定义 ShaderMaterial
        material = createHoloMaterial(cardTexture, cfg.holoIntensity);
    } else {
        // 普通材质
        material = new THREE.MeshStandardMaterial({
            map: cardTexture,
            side: THREE.DoubleSide,
            roughness: 0.7,
            metalness: 0.1
        });
    }

    var mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // ===== 鼠标交互 =====
    var mouseX = 0, mouseY = 0;
    var isHovering = false;

    canvas.addEventListener('mousemove', function(e) {
        var rect = canvas.getBoundingClientRect();
        mouseX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouseY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        isHovering = true;
    });
    canvas.addEventListener('mouseleave', function() {
        isHovering = false;
    });

    // 触摸支持
    canvas.addEventListener('touchmove', function(e) {
        e.preventDefault();
        var rect = canvas.getBoundingClientRect();
        var t = e.touches[0];
        mouseX = ((t.clientX - rect.left) / rect.width) * 2 - 1;
        mouseY = -((t.clientY - rect.top) / rect.height) * 2 + 1;
        isHovering = true;
    }, { passive: false });
    canvas.addEventListener('touchend', function() {
        isHovering = false;
    });

    return {
        renderer: renderer,
        scene: scene,
        camera: camera,
        mesh: mesh,
        geometry: geometry,
        material: material,
        initialPositions: initialPositions,
        mouseX: function() { return mouseX; },
        mouseY: function() { return mouseY; },
        isHovering: function() { return isHovering; },
        cfg: cfg,
        idx: idx
    };
}

// ===== 全息 Shader 材质 =====
function createHoloMaterial(texture, intensity) {
    var vertexShader = [
        'varying vec2 vUv;',
        'varying vec3 vNormal;',
        'varying vec3 vPosition;',
        'void main() {',
        '    vUv = uv;',
        '    vNormal = normalize(normalMatrix * normal);',
        '    vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;',
        '    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
        '}'
    ].join('\n');

    var fragmentShader = [
        'uniform sampler2D uTexture;',
        'uniform float uTime;',
        'uniform float uHoloIntensity;',
        'uniform float uHover;',
        'uniform vec2 uMouse;',
        'varying vec2 vUv;',
        'varying vec3 vNormal;',
        'varying vec3 vPosition;',
        '',
        'vec3 rainbow(float t) {',
        '    return vec3(',
        '        0.5 + 0.5 * cos(6.28318 * (t + 0.0)),',
        '        0.5 + 0.5 * cos(6.28318 * (t + 0.333)),',
        '        0.5 + 0.5 * cos(6.28318 * (t + 0.667))',
        '    );',
        '}',
        '',
        'void main() {',
        '    vec4 texColor = texture2D(uTexture, vUv);',
        '',
        '    // 全息彩虹效果 - 基于法线和观察角度',
        '    vec3 viewDir = normalize(-vPosition);',
        '    float fresnel = 1.0 - abs(dot(viewDir, vNormal));',
        '    fresnel = pow(fresnel, 2.0);',
        '',
        '    // 彩虹色谱基于 UV + 法线偏移 + 时间',
        '    float rainbowPhase = vUv.x * 2.0 + vUv.y * 1.5 + vNormal.x * 3.0 + uTime * 0.3;',
        '    vec3 holoColor = rainbow(rainbowPhase);',
        '',
        '    // 鼠标位置聚光',
        '    float mouseDist = length(vUv - uMouse * 0.5 - 0.5);',
        '    float spotlight = smoothstep(0.6, 0.0, mouseDist) * uHover;',
        '',
        '    // 扫描线效果',
        '    float scanline = sin((vUv.y + uTime * 0.1) * 80.0) * 0.5 + 0.5;',
        '    scanline = mix(1.0, scanline, 0.15 * uHoloIntensity);',
        '',
        '    // 全息强度随 hover 和 fresnel 变化',
        '    float holoStrength = (fresnel * 0.4 + spotlight * 0.6) * uHoloIntensity;',
        '',
        '    vec3 finalColor = texColor.rgb * scanline;',
        '    finalColor = mix(finalColor, finalColor + holoColor * 0.7, holoStrength);',
        '',
        '    // 边缘发光',
        '    finalColor += holoColor * fresnel * 0.15 * uHoloIntensity;',
        '',
        '    gl_FragColor = vec4(finalColor, texColor.a);',
        '}'
    ].join('\n');

    return new THREE.ShaderMaterial({
        uniforms: {
            uTexture: { value: texture },
            uTime: { value: 0 },
            uHoloIntensity: { value: intensity },
            uHover: { value: 0 },
            uMouse: { value: new THREE.Vector2(0, 0) }
        },
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
        side: THREE.DoubleSide,
        transparent: true
    });
}

// ===== 动画循环 =====
var clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    var elapsed = clock.getElapsedTime();

    instances.forEach(function(inst) {
        var positions = inst.geometry.attributes.position;
        var initial = inst.initialPositions;
        var speed = params.windSpeed;
        var height = params.waveHeight;
        var freq = params.waveFreq;

        // ===== 布料顶点动画：sin/cos 波浪 =====
        for (var i = 0; i < positions.count; i++) {
            var ix = initial[i * 3];       // 初始 X
            var iy = initial[i * 3 + 1];   // 初始 Y
            var iz = initial[i * 3 + 2];   // 初始 Z

            // 从左到右逐渐增强的波浪（模拟布料一端固定）
            var distFromLeft = (ix + 2) / 4;  // 归一化 0~1
            var waveStrength = distFromLeft * distFromLeft; // 二次方增强

            // 多层波浪叠加
            var wave1 = Math.sin(ix * freq + elapsed * speed * 2.0) * height * 0.6;
            var wave2 = Math.cos(iy * freq * 0.8 + elapsed * speed * 1.5 + 1.0) * height * 0.4;
            var wave3 = Math.sin((ix + iy) * freq * 0.5 + elapsed * speed * 2.5) * height * 0.2;

            // 微小的高频波纹（布料褶皱感）
            var ripple = Math.sin(ix * 8.0 + iy * 6.0 + elapsed * speed * 3.0) * height * 0.06;

            var totalWave = (wave1 + wave2 + wave3 + ripple) * waveStrength;

            positions.array[i * 3] = ix + Math.sin(elapsed * speed + iy * 0.5) * 0.03 * waveStrength;
            positions.array[i * 3 + 1] = iy + Math.cos(elapsed * speed * 0.7 + ix * 0.3) * 0.02 * waveStrength;
            positions.array[i * 3 + 2] = iz + totalWave;
        }

        positions.needsUpdate = true;
        inst.geometry.computeVertexNormals(); // 重算法线，让光照正确

        // ===== 鼠标交互旋转 =====
        var targetRotY = 0, targetRotX = 0;
        var hoverVal = 0;

        if (inst.isHovering()) {
            targetRotY = inst.mouseX() * 0.3;
            targetRotX = inst.mouseY() * 0.2;
            hoverVal = 1;
        }

        inst.mesh.rotation.y += (targetRotY - inst.mesh.rotation.y) * 0.08;
        inst.mesh.rotation.x += (targetRotX - inst.mesh.rotation.x) * 0.08;

        // 更新 shader uniform
        if (inst.material.uniforms) {
            inst.material.uniforms.uTime.value = elapsed;
            inst.material.uniforms.uHover.value += (hoverVal - inst.material.uniforms.uHover.value) * 0.06;
            if (inst.isHovering()) {
                inst.material.uniforms.uMouse.value.set(inst.mouseX(), inst.mouseY());
            }
        }

        // 渲染
        inst.renderer.render(inst.scene, inst.camera);
    });
}

animate();
</script>
</body>
</html>
